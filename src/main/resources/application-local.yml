spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/boom
    username: boom
    password: boom

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    root: INFO
    com.boom: DEBUG

boom:
  auth:
    cookie-name: BOOM_SESSION
    session-ttl-minutes: 720
    dev-mode: true
    hash-pepper: local-dev-change-me